services:
  postgres:
    image: postgres:17-alpine
    container_name: agrafa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER}/agrafa-backend:latest
    container_name: agrafa-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    command:
      - /bin/sh
      - -ec
      - |
        psql "$$POSTGRES_URI" -v ON_ERROR_STOP=1 -c "CREATE SCHEMA IF NOT EXISTS \"${POSTGRES_MIGRATIONS_SCHEMA}\""
        case "$$POSTGRES_URI" in
          *\?*) POSTGRES_MIGRATIONS_URI="$$POSTGRES_URI&x-migrations-table=%22${POSTGRES_MIGRATIONS_SCHEMA}%22.%22${POSTGRES_MIGRATIONS_TABLE}%22&x-migrations-table-quoted=true" ;;
          *) POSTGRES_MIGRATIONS_URI="$$POSTGRES_URI?x-migrations-table=%22${POSTGRES_MIGRATIONS_SCHEMA}%22.%22${POSTGRES_MIGRATIONS_TABLE}%22&x-migrations-table-quoted=true" ;;
        esac
        migrate -path /app/src/db/migrations/app -database "$$POSTGRES_MIGRATIONS_URI" up
        exec agrafa-backend
    expose:
      - "8080"
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/${GHCR_OWNER}/agrafa-frontend:latest
    container_name: agrafa-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"

volumes:
  postgres-data:
