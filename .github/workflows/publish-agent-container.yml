name: Publish Agent Container

on:
  workflow_dispatch:
  push:
    tags:
      - "agent-v*.*.*"
      - "agent-v*.*.*-*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event_name != 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/agrafa-agent" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME#agent-v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/agent-v') }}
            type=raw,value=${{ steps.image.outputs.tag }},enable=${{ startsWith(github.ref, 'refs/tags/agent-v') }}
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Agrafa Agent
            org.opencontainers.image.description=Container image for the Agrafa node agent.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          file: ./agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
